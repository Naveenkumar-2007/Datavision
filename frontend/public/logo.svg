<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="leafGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86c841"/>
      <stop offset="50%" style="stop-color:#4a9c2d"/>
      <stop offset="100%" style="stop-color:#1e5a1e"/>
    </linearGradient>
    <linearGradient id="leafGradient2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7bc43c"/>
      <stop offset="100%" style="stop-color:#3d7a2a"/>
    </linearGradient>
    <linearGradient id="barGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#5ab032"/>
      <stop offset="100%" style="stop-color:#8cd44a"/>
    </linearGradient>
    <linearGradient id="globeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9c2d"/>
      <stop offset="100%" style="stop-color:#1e5a1e"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle (optional, for contrast) -->
  <circle cx="100" cy="100" r="95" fill="#f5f5f5" opacity="0"/>
  
  <!-- Main leaf shape - outer -->
  <path d="M 30 140 
           Q 20 100 40 60 
           Q 60 20 100 30 
           Q 180 50 180 100 
           Q 180 140 140 160 
           Q 100 180 60 160 
           Q 35 150 30 140 Z" 
        fill="url(#leafGradient1)" />
  
  <!-- Inner leaf curve -->
  <path d="M 40 130 
           Q 35 100 50 70 
           Q 65 40 95 45 
           Q 160 60 165 100 
           Q 165 130 135 145 
           Q 100 160 65 145 
           Q 45 138 40 130 Z" 
        fill="url(#leafGradient2)" />
  
  <!-- Eye outline / Globe container -->
  <ellipse cx="115" cy="108" rx="45" ry="40" fill="#1e5a1e" stroke="#0d3d0d" stroke-width="3"/>
  
  <!-- Globe/Eye center -->
  <circle cx="115" cy="108" r="32" fill="none" stroke="#4a7a3a" stroke-width="2"/>
  
  <!-- Globe latitude lines -->
  <ellipse cx="115" cy="108" rx="32" ry="12" fill="none" stroke="#4a7a3a" stroke-width="1.5"/>
  <ellipse cx="115" cy="108" rx="32" ry="24" fill="none" stroke="#4a7a3a" stroke-width="1.5"/>
  
  <!-- Globe longitude lines -->
  <path d="M 115 76 Q 95 108 115 140" fill="none" stroke="#4a7a3a" stroke-width="1.5"/>
  <path d="M 115 76 Q 135 108 115 140" fill="none" stroke="#4a7a3a" stroke-width="1.5"/>
  <line x1="115" y1="76" x2="115" y2="140" stroke="#4a7a3a" stroke-width="1.5"/>
  <line x1="83" y1="108" x2="147" y2="108" stroke="#4a7a3a" stroke-width="1.5"/>
  
  <!-- Bar chart -->
  <rect x="42" y="95" width="12" height="35" rx="2" fill="url(#barGradient)"/>
  <rect x="58" y="78" width="12" height="52" rx="2" fill="url(#barGradient)"/>
  <rect x="74" y="62" width="12" height="68" rx="2" fill="url(#barGradient)"/>
  
  <!-- Network nodes (top) -->
  <circle cx="65" cy="35" r="5" fill="white" stroke="#3d7a2a" stroke-width="1"/>
  <circle cx="50" cy="50" r="4" fill="white" stroke="#3d7a2a" stroke-width="1"/>
  <circle cx="85" cy="25" r="4" fill="white" stroke="#3d7a2a" stroke-width="1"/>
  <circle cx="105" cy="32" r="5" fill="white" stroke="#3d7a2a" stroke-width="1"/>
  <circle cx="125" cy="38" r="4" fill="white" stroke="#3d7a2a" stroke-width="1"/>
  <circle cx="145" cy="50" r="5" fill="white" stroke="#3d7a2a" stroke-width="1"/>
  <circle cx="160" cy="62" r="4" fill="white" stroke="#3d7a2a" stroke-width="1"/>
  <circle cx="40" cy="65" r="3" fill="white" stroke="#3d7a2a" stroke-width="1"/>
  <circle cx="168" cy="78" r="3" fill="white" stroke="#3d7a2a" stroke-width="1"/>
  
  <!-- Network connections -->
  <line x1="50" y1="50" x2="65" y2="35" stroke="#2d5a2a" stroke-width="1.5"/>
  <line x1="65" y1="35" x2="85" y2="25" stroke="#2d5a2a" stroke-width="1.5"/>
  <line x1="85" y1="25" x2="105" y2="32" stroke="#2d5a2a" stroke-width="1.5"/>
  <line x1="105" y1="32" x2="125" y2="38" stroke="#2d5a2a" stroke-width="1.5"/>
  <line x1="125" y1="38" x2="145" y2="50" stroke="#2d5a2a" stroke-width="1.5"/>
  <line x1="145" y1="50" x2="160" y2="62" stroke="#2d5a2a" stroke-width="1.5"/>
  <line x1="40" y1="65" x2="50" y2="50" stroke="#2d5a2a" stroke-width="1.5"/>
  <line x1="160" y1="62" x2="168" y2="78" stroke="#2d5a2a" stroke-width="1.5"/>
</svg>
